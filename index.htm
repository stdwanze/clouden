<head>
<style>
    body { margin: 0; background: white; display: flex; justify-content: center; align-items: flex-start; padding-top: 20px; min-height: 100vh; box-sizing: border-box; }
    canvas { display: block; background: white; width: 1100px; height: 688px; }
    .game-container { position: relative; display: inline-block; }
    #helpBtn, #muteBtn {
        position: absolute; right: 10px;
        width: 36px; height: 36px; border-radius: 50%;
        background: rgba(0,0,0,0.5); color: white;
        border: 2px solid white; font-size: 18px; font-weight: bold;
        cursor: pointer; z-index: 10;
    }
    #muteBtn { top: 155px; }
    #helpBtn { top: 201px; }
    #gamepadIndicator {
        position: absolute; right: 10px; top: 247px;
        width: 36px; height: 36px; border-radius: 50%;
        background: rgba(0,0,0,0.5); color: white;
        border: 2px solid white; font-size: 20px;
        display: none; align-items: center; justify-content: center;
        z-index: 10; cursor: default;
    }
    #muteBtn.muted { background: rgba(0,0,0,0.2); color: rgba(255,255,255,0.4); border-color: rgba(255,255,255,0.4); }
    #saveIndicator {
        position: absolute; top: 10px; left: 130px;
        display: none; align-items: center; gap: 6px;
        background: rgba(0,0,0,0.5); border: 2px solid white; border-radius: 18px;
        padding: 4px 8px 4px 14px; color: white; font-size: 13px;
        font-family: monospace; z-index: 10;
    }
    #deleteSaveBtn {
        background: none; border: 1px solid rgba(255,255,255,0.4); border-radius: 50%;
        color: rgba(255,255,255,0.7); cursor: pointer; font-size: 13px;
        width: 22px; height: 22px; line-height: 1; padding: 0;
    }
    #deleteSaveBtn:hover { background: rgba(255,255,255,0.15); color: white; }
    #confirmOverlay {
        display: none; position: absolute; inset: 0;
        background: rgba(0,0,0,0.65); z-index: 20;
        justify-content: center; align-items: center;
    }
    #confirmDialog {
        background: #1a1e28; border: 2px solid #445566; border-radius: 8px;
        padding: 30px 40px; color: white; font-family: monospace; text-align: center;
    }
    #confirmDialog p { margin: 0 0 22px; font-size: 16px; }
    .confirm-btns { display: flex; gap: 12px; justify-content: center; }
    .confirm-btns button {
        padding: 8px 22px; border-radius: 4px; border: 2px solid #445566;
        background: #232835; color: white; font-size: 14px;
        cursor: pointer; font-family: monospace;
    }
    .confirm-btns button:hover { background: #2e3545; }
</style>

<body>
<div class="game-container">
<canvas id="playground" width="1280" height="800"></canvas>
<button id="muteBtn">&#9835;</button>
<button id="helpBtn">?</button>
<div id="gamepadIndicator" title="Gamepad verbunden">&#x1F3AE;</div>
<div id="saveIndicator">
    Spielstand
    <button id="deleteSaveBtn" title="Spielstand l&ouml;schen">&#x2715;</button>
</div>
<div id="confirmOverlay">
    <div id="confirmDialog">
        <p>Spielstand wirklich l&ouml;schen?</p>
        <div class="confirm-btns">
            <button id="confirmYes">Ja, l&ouml;schen</button>
            <button id="confirmNo">Abbrechen</button>
        </div>
    </div>
</div>
</div>

<script>
    function updateSaveIndicator() {
        var el = document.getElementById('saveIndicator');
        el.style.display = CM.SaveLoad.getSavedSeed() !== null ? 'flex' : 'none';
    }
    window.updateSaveIndicator = updateSaveIndicator;

    var activeEngine = null;

    document.getElementById('deleteSaveBtn').addEventListener('click', function() {
        if (activeEngine) activeEngine.paused = true;
        document.getElementById('confirmOverlay').style.display = 'flex';
    });
    document.getElementById('confirmYes').addEventListener('click', function() {
        CM.SaveLoad.clear();
        updateSaveIndicator();
        document.getElementById('confirmOverlay').style.display = 'none';
        if (activeEngine) activeEngine.paused = false;
    });
    document.getElementById('confirmNo').addEventListener('click', function() {
        document.getElementById('confirmOverlay').style.display = 'none';
        if (activeEngine) activeEngine.paused = false;
    });

    window.addEventListener("load", function() {
        updateSaveIndicator();
        CM.Sound.init();
        CM.Sound.toggleMute();
        document.getElementById('muteBtn').classList.add('muted');

        // Init seeded RNG — use saved seed for reproducible world, or generate a new one.
        var seed = CM.SaveLoad.getSavedSeed();
        if (seed === null) seed = Math.random();
        CM.initRng(seed);

        var repo = new CM.ImageRepo();
        repo.load().then(function (){
            var world = new CM.World(10,10, CM.TILECREATOR(repo,300));
            var cloudSource = new CM.CloudSource(world.getSizeX(), world.getSizeY(),CM.CLOUDGEN(world, repo));
           
            world.addObjects(cloudSource.generateClouds(0.05,0.05));
            var engine = new CM.CloudEngine(new CM.Renderer("playground"),world,repo, new CM.Point(10, 10));
            engine.init();
            activeEngine = engine;
            engine.run();
            CM.Sound.startMusic();

            document.getElementById('muteBtn').addEventListener('click', function() {
                var muted = CM.Sound.toggleMute();
                this.classList.toggle('muted', muted);
            });


        });
    });

</script>

</body>
