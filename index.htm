<head>
<style>
    body { margin: 0; background: white; display: flex; justify-content: center; align-items: flex-start; padding-top: 20px; min-height: 100vh; box-sizing: border-box; }
    canvas { display: block; background: white; width: 1100px; height: 688px; }
    .game-container { position: relative; display: inline-block; }
    #helpBtn, #muteBtn {
        position: absolute; top: 10px;
        width: 36px; height: 36px; border-radius: 50%;
        background: rgba(0,0,0,0.5); color: white;
        border: 2px solid white; font-size: 18px; font-weight: bold;
        cursor: pointer; z-index: 10;
    }
    #helpBtn { right: 10px; }
    #muteBtn { right: 56px; }
    #muteBtn.muted { background: rgba(0,0,0,0.2); color: rgba(255,255,255,0.4); border-color: rgba(255,255,255,0.4); }
</style>
     <script
    src="https://code.jquery.com/jquery-3.2.1.js"
    integrity="sha256-DZAnKJ/6XZ9si04Hgrsxu/8s717jcIzLy3oi35EouyE="
    crossorigin="anonymous"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.4/howler.min.js"></script>

    <script type="text/javascript" src="src/globals.js"></script>
    <script type="text/javascript" src="src/sound.js"></script>
    
    <script type="text/javascript" src="src/imagerepo.js"></script>
    <script type="text/javascript" src="src/simulations.js"></script>
    
    <script type="text/javascript" src="src/objects.js"></script>
    <script type="text/javascript" src="src/osd.js"></script>
    
    <script type="text/javascript" src="src/player.js"></script>
    <script type="text/javascript" src="src/enemy.js"></script>
    
    <script type="text/javascript" src="src/algos.js"></script>
    <script type="text/javascript" src="src/world.js"></script>
    
    <script type="text/javascript" src="src/app.js"></script>
<script type="text/javascript" src="src/renderer.js"></script>
<script type="text/javascript" src="src/onscreendoc.js"></script>

<script type="text/javascript" src="src/utils.js"></script>

</head>

<body>
<div class="game-container">
<canvas id="playground" width="1280" height="800"></canvas>
<button id="muteBtn">&#9835;</button>
<button id="helpBtn">?</button>
</div>

<script>
    window.addEventListener("load", function() {
    
        
        CM.Sound.init();

        var repo = new CM.ImageRepo();
        repo.load().then(function (){
            var world = new CM.World(10,10, CM.TILECREATOR(repo,300));
            var cloudSource = new CM.CloudSource(world.getSizeX(), world.getSizeY(),CM.CLOUDGEN(world, repo));
           
            world.addObjects(cloudSource.generateClouds(0.05,0.05));
            var engine = new CM.CloudEngine(new CM.Renderer("playground"),world,repo, new CM.Point(10, 10));
            engine.init();
            engine.run();
            CM.Sound.startMusic();

            document.getElementById('muteBtn').addEventListener('click', function() {
                var muted = CM.Sound.toggleMute();
                this.classList.toggle('muted', muted);
            });


        });
    });

</script>

</body>
